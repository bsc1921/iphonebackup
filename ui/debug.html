<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>iPhone Debug Test</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #f0f0f0; }
    button { padding: 12px 24px; font-size: 14px; cursor: pointer; background: #007aff; color: white; border: none; border-radius: 8px; margin: 4px; }
    pre { background: #1c1c1e; color: #a8ff78; padding: 16px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; font-size: 12px; }
    .err { color: #ff6b6b; }
    #deviceName { font-size: 20px; font-weight: bold; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>iPhone Debug Test</h2>
  <button onclick="testRaw()">1. Raw fetch /api/devices</button>
  <button onclick="testApi()">2. Test api() helper</button>
  <button onclick="testDetect()">3. Full detectDevice()</button>
  <div id="deviceName"></div>
  <pre id="out">Click a button...</pre>

  <script>
    // Exact copy of api() from app.js
    async function api(path, opts = {}) {
      const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
      const data = await res.json();
      if (!res.ok) throw data;
      return data;
    }

    async function testRaw() {
      const out = document.getElementById('out');
      out.className = '';
      out.textContent = 'Fetching...';
      try {
        const r = await fetch('/api/devices');
        const data = await r.json();
        out.textContent = 'STATUS: ' + r.status + '\n\n' + JSON.stringify(data, null, 2);
      } catch(e) {
        out.className = 'err';
        out.textContent = 'ERROR: ' + e.message + '\n' + e.stack;
      }
    }

    async function testApi() {
      const out = document.getElementById('out');
      out.className = '';
      out.textContent = 'Testing api() helper...';
      try {
        const data = await api('/api/devices');
        out.textContent = 'api() returned:\n\n' + JSON.stringify(data, null, 2);
      } catch(e) {
        out.className = 'err';
        out.textContent = 'api() threw:\n' + e.message + '\n' + JSON.stringify(e, null, 2);
      }
    }

    async function testDetect() {
      const out = document.getElementById('out');
      out.className = '';
      out.textContent = 'Running detectDevice() logic...';
      try {
        const data = await api('/api/devices');
        const devices = data.devices || [];
        out.textContent = 'devices.length = ' + devices.length + '\n\n';
        if (devices.length) {
          const d = devices[0];
          document.getElementById('deviceName').textContent = '📱 ' + d.name + ' — iOS ' + d.ios_version;
          out.textContent += 'First device:\n' + JSON.stringify(d, null, 2);
        } else {
          out.textContent += 'No devices returned';
        }
      } catch(e) {
        out.className = 'err';
        out.textContent = 'ERROR in detectDevice:\n' + e.message + '\n' + e.stack;
      }
    }
  </script>
</body>
</html>
