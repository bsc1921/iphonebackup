<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>iPhone Test</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #f0f0f0; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007aff; color: white; border: none; border-radius: 8px; }
    pre { background: #1c1c1e; color: #a8ff78; padding: 16px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; }
    .err { color: #ff6b6b; }
  </style>
</head>
<body>
  <h2>iPhone Detection Test</h2>
  <button onclick="test()">Detect iPhone</button>
  <pre id="out">Click the button...</pre>

  <script>
    async function test() {
      const out = document.getElementById('out');
      out.textContent = 'Calling /api/devices...';
      try {
        const r = await fetch('/api/devices');
        const data = await r.json();
        out.textContent = JSON.stringify(data, null, 2);
      } catch(e) {
        out.className = 'err';
        out.textContent = 'ERROR: ' + e.message;
      }
    }
  </script>
</body>
</html>
