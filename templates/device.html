{% extends "base.html" %}
{% block title %}Device Info – {{ udid[:8] }}{% endblock %}

{% block content %}
<h1>Device Info <small class="mono">{{ udid }}</small></h1>

<section class="card">
  <table>
    <tbody>
      {% for key, value in info.items() %}
      <tr>
        <th>{{ key }}</th>
        <td>{{ value or '—' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>

<div class="actions">
  <form method="post" action="{{ url_for('backup') }}">
    <input type="hidden" name="udid" value="{{ udid }}">
    <button class="btn btn-primary" type="submit">Start Backup</button>
  </form>
  <form method="post" action="{{ url_for('restore') }}">
    <input type="hidden" name="udid" value="{{ udid }}">
    <button class="btn btn-danger" type="submit"
      onclick="return confirm('Restore will overwrite device data. Continue?')">
      Restore from Backup
    </button>
  </form>
  <a class="btn" href="{{ url_for('index') }}">← Back</a>
</div>
{% endblock %}
